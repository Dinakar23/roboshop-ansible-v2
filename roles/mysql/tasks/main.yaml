- name: Lookup secretsmanager secret in the current region
  debug: 
    msg: "{{ lookup('amazon.aws.aws_secret', 'roboshop/mysql_root_password', bypath=false, region='us-east-1') | from_json }}"

- name : installing mysql server
  package :
    name : mysql-server
    state : present

- name : start and enabling the services
  service :
    name : mysqld
    state : restarted
    enabled : yes

- name : setup root password
  command : mysql_secure_installation --set-root-pass "{{ MY_SQL_ROOT_PASSWORD }}"