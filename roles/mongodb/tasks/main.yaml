  - name : copy mongo repo
    copy:
      src : mongo.repo
      dest : /etc/yum.repos.d/mongo.repo
      
  - name : install mongodb server
    ansible.builtin.package:
      name: mongodb-org
      state: present

  - name : allow remote connections
    replace :
      path: /etc/mongod.conf
      regexp: '127.0.0.1 '
      replace: '0.0.0.0 '

  - name : Start & Enable MongoDB Service
    service :
      name : mongod
      state : started
      enabled : yes