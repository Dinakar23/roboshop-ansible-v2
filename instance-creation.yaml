- name : roboshop instances management
  hosts : localhost
  connection : local
  vars :
    instances : ["mongodb","redis","rabbitmq","mysql","catalogue","user","cart","shipping","payment","frontend"]
    image_id : ami-0220d79f3f480ecf5
    region: us-east-1
    domain_name : dinakardevops.online
    action : create

  tasks :
  - name : create ec2 instances
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      name : "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      security_groups:
      - "roboshop-{{ item }}"
      - roboshop-common
      region: "{{ region }}"
    loop : "{{ instances }}"
    register : ec2_output
    when : action=="create"

  # - name : print output
  #   debug :
  #     msg : " {{ ec2_output }} "

  # - name : create R53 records
  #   debug :
  #     msg : " instance_name : {{ item.item }} private_ip : {{ item.instances[0].private_ip_address }}  "
  #   loop : "{{ ec2_output.results }}"

  - name : Create Route53 records
    amazon.aws.route53 :
      state: present
      zone: "{{ domain_name }}"
      record : "{{ item.item }}.{{ domain_name }}" #mongodb.dinakardevops.online
      type: A
      ttl: 1
      overwrite : true
      value : "{{ item.instances[0].private_ip_address }}"
    loop : "{{ ec2_output.results }}"
    when : action=="create"


  - name : Create Route53 record for frontend 
    amazon.aws.route53 :
      state: present
      zone: "{{ domain_name }}"
      record : "{{ domain_name }}" #mongodb.dinakardevops.online
      type: A
      ttl: 1
      overwrite: true
      value : "{{ item.instances[0].public_ip_address }}"
    loop : "{{ ec2_output.results }}" 
    when : 
      - item.item == "frontend"
      - action=="create"


  - name : Delete Route53 records
    amazon.aws.route53 :
      state : absent
      zone : "{{ domain_name }}"
      record : "{{ item }}.{{ domain_name }}"
      type: A
      ttl: 1
      overwrite: true
    loop : "{{ instances }}"
    when : action == "delete"

  - name : Delete Route53 for  frontend record
    amazon.aws.route53 :
      state : absent
      zone : "{{ domain_name }}"
      record : "{{ domain_name }}" #dinakardevops.online
      type: A
      ttl: 1
      overwrite: true
    loop : "{{ instances }}"
    when : 
    - action == "delete"
    - item == "frontend"

  - name: Delete roboshop ec2 instances
    amazon.aws.ec2_instance:
      state: absent                                 # 1. Tells AWS to terminate the instance
      name: "roboshop-{{ item }}"                  # 2. Finds the instance matching this exact name
      region: "{{ region }}"
      wait : false
    loop: "{{ instances }}"      
    when : action == "delete"                  # 3. Loops through ["mongodb", "redis", "rabbitmq", "mysql"]


